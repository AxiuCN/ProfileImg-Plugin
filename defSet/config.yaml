# ==============================================================
# ProfileImg-Plugin 配置文件
# 请将此文件复制为 config.yaml 并根据需要修改
# ==============================================================
update:
  # ---------- 插件自身更新设置 ----------
  pluginSelf:
    # 是否启用插件自身的自动检查更新
    enabled: ${pluginSelf_enabled}
    # 自动检查更新的 cron 表达式（默认每天 5:00）
    cron: "${pluginSelf_cron}"
    # 是否在检测到更新后自动下载覆盖（true=自动更新，false=仅通知主人）
    autoUpdate: ${pluginSelf_autoUpdate}
    # 自动更新后是否重启云崽（代码更新后需要重启生效，建议设为 true）
    autoRestart: ${pluginSelf_autoRestart}

  # ---------- 主图库更新设置 ----------
  mainGallery:
    # 是否启用主图库的自动检查更新
    enabled: ${mainGallery_enabled}
    # 自动检查更新的 cron 表达式（默认每天 5:20）
    cron: "${mainGallery_cron}"
    # 是否在检测到更新后自动执行 git pull
    autoUpdate: ${mainGallery_autoUpdate}
    # 自动更新后是否重启云崽（主图库更新一般无需重启，设为 false）
    autoRestart: ${mainGallery_autoRestart}

  # ---------- 屏蔽图库更新设置 ----------
  blockedGallery:
    # 是否启用屏蔽图库的自动检查更新
    enabled: ${blockedGallery_enabled}
    # 自动检查更新的 cron 表达式（默认每天 5:40）
    cron: "${blockedGallery_cron}"
    # 是否在检测到更新后自动执行 git pull
    autoUpdate: ${blockedGallery_autoUpdate}
    # 自动更新后是否重启云崽（屏蔽图库更新无需重启，设为 false）
    autoRestart: ${blockedGallery_autoRestart}

# ---------- 上传压缩设置 ----------
upload:
  # 是否在上传面板图时启用压缩（默认关闭）
  enabled: ${upload_enabled}
  # 压缩输出格式，可选 webp、jpeg、png
  format: "${upload_format}"
  # 目标压缩大小（单位：KB，默认 500）
  maxSize: ${upload_maxSize}